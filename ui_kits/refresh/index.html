<!doctype html>
<html lang="ru" data-screen-label="Refresh runner">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MM Market Tools — Обновление данных</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="../../ui_source/styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  /* Refresh-only progress bar — lifted inline from ui_source/refresh.html. */
  .progress-wrap { margin: 8px 0 4px; }
  .progress-label { display: flex; justify-content: space-between; align-items: baseline; font-size: .8rem; margin-bottom: 4px; color: var(--muted); }
  .progress-elapsed { font-variant-numeric: tabular-nums; }
  .progress-track { height: 6px; border-radius: 3px; background: var(--line); overflow: hidden; }
  .progress-fill--indeterminate { height: 100%; width: 40%; border-radius: 3px; background: var(--accent); animation: progress-slide 1.5s ease-in-out infinite; }
  @keyframes progress-slide { 0% { transform: translateX(-100%); } 100% { transform: translateX(350%); } }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="data.js"></script>
  <script type="text/babel" src="App.jsx"></script>
</body>
</html>
