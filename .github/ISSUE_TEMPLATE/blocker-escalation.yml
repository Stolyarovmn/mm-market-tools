name: Blocker / Escalation
description: Блокер, который мешает безопасно продолжать задачу
title: "[blocker] "
labels:
  - type:blocker
  - status:blocked
body:
  - type: input
    id: blocked_work
    attributes:
      label: Blocked work
      placeholder: Какая задача или поток работы заблокирован
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Reason
      description: Конкретная причина блокировки.
    validations:
      required: true
  - type: textarea
    id: what_was_checked
    attributes:
      label: What was checked
      description: Какие проверки уже выполнены перед эскалацией.
  - type: textarea
    id: unblock_options
    attributes:
      label: Possible unblock options
      description: Если есть 1-3 разумных пути разблокировки, зафиксируй их.

