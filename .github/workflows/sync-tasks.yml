name: Sync TASKS.md to GitHub Issues

on:
  push:
    branches: [main]
    paths: ['TASKS.md']
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sync tasks → Issues
        run: python3 skills/mm-github/mm_github.py sync-tasks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          AGENT_NAME: github-actions
