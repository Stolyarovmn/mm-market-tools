name: Daily Action Plan

on:
  schedule:
    - cron: '0 6 * * 1-5'   # 06:00 UTC (09:00 MSK), Mon-Fri
  workflow_dispatch:
    inputs:
      ke_token:
        description: 'MM/KE Bearer token (overrides secret for this run)'
        required: false
        default: ''
        type: string
      report_kind:
        description: 'Report kind to regenerate'
        required: false
        default: 'daily_action_plan'
        type: choice
        options:
          - daily_action_plan
          - paid_storage_report
          - sales_return_report
          - dynamic_pricing
          - competitor_market_analysis
          - all

jobs:
  generate-plan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt --quiet

      - name: Generate daily action plan
        env:
          KE_TOKEN: ${{ inputs.ke_token != '' && inputs.ke_token || secrets.KE_TOKEN }}
          CUBEJS_TOKEN: ${{ inputs.ke_token != '' && inputs.ke_token || secrets.CUBEJS_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          REPORT="${{ github.event.inputs.report_kind || 'daily_action_plan' }}"
          if [ "$REPORT" = "all" ]; then
            python3 core/refresh_jobs.py --job paid_storage_report || true
            python3 core/refresh_jobs.py --job sales_return_report || true
            python3 core/refresh_jobs.py --job dynamic_pricing || true
          fi
          python3 build_dashboard_index.py || echo "WARNING: build_dashboard_index.py not found, using existing data"

      - name: Build SQLite database
        run: python3 scripts/build_sqlite.py

      - name: Create GitHub Release with data.db
        run: |
          DATE=$(date -u +%Y-%m-%d)
          TAG="data-${DATE}"
          # Create release (or upload to existing same-day release)
          gh release create "$TAG" data.db \
            --title "Data snapshot ${DATE}" \
            --notes "Automated daily data snapshot. Generated by GitHub Actions." \
            --prerelease 2>/dev/null \
          || gh release upload "$TAG" data.db --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete releases older than 7 days
        run: |
          CUTOFF=$(date -d '7 days ago' -u +%Y-%m-%dT%H:%M:%SZ)
          gh release list --limit 100 --json tagName,createdAt \
            | jq -r --arg cutoff "$CUTOFF" \
              '.[] | select(.tagName | startswith("data-")) | select(.createdAt < $cutoff) | .tagName' \
            | while read -r tag; do
                echo "Deleting old release: $tag"
                gh release delete "$tag" --yes --cleanup-tag || true
              done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
