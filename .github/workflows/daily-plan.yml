name: Daily Action Plan

on:
  schedule:
    - cron: '0 6 * * 1-5'   # 06:00 UTC (09:00 MSK), Mon-Fri
  workflow_dispatch:          # Manual trigger with inputs
    inputs:
      report_kind:
        description: 'Report kind to regenerate'
        required: false
        default: 'daily_action_plan'
        type: choice
        options:
          - daily_action_plan
          - paid_storage_report
          - sales_return_report
          - dynamic_pricing
          - competitor_market_analysis
          - all

jobs:
  generate-plan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt --quiet

      - name: Generate daily action plan
        env:
          KE_TOKEN: ${{ secrets.KE_TOKEN }}
          CUBEJS_TOKEN: ${{ secrets.CUBEJS_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          REPORT="${{ github.event.inputs.report_kind || 'daily_action_plan' }}"
          if [ "$REPORT" = "all" ]; then
            python3 core/refresh_jobs.py --job paid_storage_report
            python3 core/refresh_jobs.py --job sales_return_report
            python3 core/refresh_jobs.py --job dynamic_pricing
          fi
          python3 build_daily_action_plan.py --offline-fallback

      - name: Update dashboard HTML
        run: |
          python3 skills/mm-github/mm_github.py deploy-dashboard
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          AGENT_NAME: github-actions

      - name: Commit and push updated data
        run: |
          git config user.email "actions@github.com"
          git config user.name "MM Market Bot"
          git add data/dashboard/ docs/
          git diff --staged --quiet || git commit -m "data: daily plan update [$(date -u +%Y-%m-%d)]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
